<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Java Docker Jenkins Application</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 80px auto;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 40px 30px;
            text-align: center;
        }
        h1 {
            font-size: 2.2em;
            margin-bottom: 0.5em;
            font-weight: 700;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 1.5em;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #fff;
            color: #764ba2;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1em;
            transition: background 0.2s, color 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .btn:hover {
            background: #764ba2;
            color: #fff;
        }
        .footer {
            margin-top: 2em;
            font-size: 0.95em;
            color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Java Docker Jenkins Application!</h1>
        <p>
            This is a sample application deployed in a Docker container.<br>
            <strong>CI/CD powered by Jenkins.</strong>
        </p>
        <a class="btn" href="https://www.jenkins.io/" target="_blank">Learn More about Jenkins</a>
        <div class="footer">
            &copy; 2026 Java Docker Jenkins Demo
        </div>
    </div>
</body>
</html>
