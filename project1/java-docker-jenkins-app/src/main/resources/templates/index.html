<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cars Java Docker Jenkins App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 80px auto;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 40px 30px;
            text-align: center;
        }
        h1 {
            font-size: 2.2em;
            margin-bottom: 0.5em;
            font-weight: 700;
        }
        .car-animation {
            width: 100%;
            height: 120px;
            position: relative;
            overflow: visible;
            margin-bottom: 30px;
        }
        .car {
            position: absolute;
            left: -120px;
            top: 40px;
            width: 120px;
            animation: drive 3s linear infinite;
        }
        .car2 {
            position: absolute;
            left: -180px;
            top: 80px;
            width: 90px;
            animation: drive2 4s linear infinite;
            opacity: 0.8;
        }
        @keyframes drive {
            0% {
                left: -120px;
            }
            100% {
                left: 700px;
            }
        }
        @keyframes drive2 {
            0% {
                left: -180px;
            }
            100% {
                left: 700px;
            }
        }
        .footer {
            margin-top: 2em;
            font-size: 0.95em;
            color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="car-animation" style="height:320px;">
            <div class="tenor-gif-embed" data-postid="27312058" data-share-method="host" data-aspect-ratio="1.77778" data-width="100%">
                <a href="https://tenor.com/view/tarzan-and-jane-gif-27312058">Tarzan And Jane GIF</a>
                from <a href="https://tenor.com/search/tarzan+and+jane-gifs">Tarzan And Jane GIFs</a>
            </div>
            <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
        </div>
        <h1>Welcome to the Cars Java Docker Jenkins Application!</h1>
        <p>
            Watch the cars drive across the road!<br>
            This is a sample application deployed in a Docker container.<br>
            <strong>CI/CD powered by Jenkins.</strong>
        </p>
        <div class="footer">
            &copy; 2026 Cars Java Docker Jenkins Demo
        </div>
    </div>
</body>
</html>
