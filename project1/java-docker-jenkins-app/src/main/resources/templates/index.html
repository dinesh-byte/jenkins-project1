<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tarzan Java Docker Jenkins App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 80px auto;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 40px 30px;
            text-align: center;
        }
        h1 {
            font-size: 2.2em;
            margin-bottom: 0.5em;
            font-weight: 700;
        }
        .tarzan-animation {
            width: 100%;
            height: 200px;
            position: relative;
            overflow: visible;
            margin-bottom: 30px;
        }
        .tarzan {
            position: absolute;
            left: -100px;
            top: 60px;
            width: 100px;
            animation: swing 3s cubic-bezier(.36,.07,.19,.97) infinite;
        }
        @keyframes swing {
            0% {
                left: -100px;
                top: 60px;
                transform: rotate(-30deg);
            }
            30% {
                left: 120px;
                top: 0px;
                transform: rotate(10deg);
            }
            60% {
                left: 340px;
                top: 60px;
                transform: rotate(-10deg);
            }
            100% {
                left: 600px;
                top: 120px;
                transform: rotate(0deg);
            }
        }
        .footer {
            margin-top: 2em;
            font-size: 0.95em;
            color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tarzan-animation">
            <!-- Simple SVG for Tarzan (replace with a better SVG or GIF for production) -->
            <svg class="tarzan" viewBox="0 0 64 64">
                <circle cx="32" cy="16" r="12" fill="#f9d29d"/>
                <rect x="26" y="28" width="12" height="24" rx="6" fill="#8d5524"/>
                <rect x="18" y="36" width="8" height="24" rx="4" fill="#c68642"/>
                <rect x="38" y="36" width="8" height="24" rx="4" fill="#c68642"/>
                <rect x="28" y="52" width="4" height="10" rx="2" fill="#e0ac69"/>
                <rect x="32" y="52" width="4" height="10" rx="2" fill="#e0ac69"/>
                <!-- Vine -->
                <rect x="30" y="0" width="4" height="28" rx="2" fill="#388e3c"/>
            </svg>
        </div>
        <h1>Welcome to the Tarzan Java Docker Jenkins Application!</h1>
        <p>
            Watch Tarzan swing through the jungle!<br>
            This is a sample application deployed in a Docker container.<br>
            <strong>CI/CD powered by Jenkins.</strong>
        </p>
        <div class="footer">
            &copy; 2026 Tarzan Java Docker Jenkins Demo
        </div>
    </div>
</body>
</html>
